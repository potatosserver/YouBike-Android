name: youbike_android
description: A professional YouBike station finder.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.1
  flutter_map: ^8.3.1
  latlong2: ^0.9.1
  http: ^1.2.0
  geolocator: ^14.0.3
  sliding_up_panel: ^2.0.0
  flutter_map_marker_cluster: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
