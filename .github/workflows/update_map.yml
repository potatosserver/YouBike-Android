name: Generate YouBike Base Map

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate OMT v3 Compatible Map
        run: |
          # 下載 Planetiler
          wget https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar
          
          # 下載全台 OSM 資料
          wget https://download.geofabrik.de/asia/taiwan-latest.osm.pbf
          
          # 執行打包
          # --profile=openmaptiles: 確保輸出的 Schema 符合 OFM 樣式標準
          # --exclude-layers=poi,mountain_peak: 移除無用雜訊，大幅縮小檔案
          # --maxzoom=16: 維持高效能，並透過 App 向量放大支援 18 級顯示
          java -Xmx12g -jar planetiler.jar \
            --profile=openmaptiles \
            --osm-path=taiwan-latest.osm.pbf \
            --output=taiwan_omt_v3.pmtiles \
            --exclude-layers=poi,mountain_peak \
            --maxzoom=16 \
            --download \
            --force
          
          ls -lh taiwan_omt_v3.pmtiles

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-omt-v3-map
          path: taiwan_omt_v3.pmtiles
          retention-days: 7
