name: Generate YouBike Base Map

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate High-Res Base Map
        run: |
          # 下載 Planetiler
          wget https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar
          
          # 下載全台 OSM 資料
          wget https://download.geofabrik.de/asia/taiwan-latest.osm.pbf
          
          # 執行精簡化打包
          # 僅保留：transportation (道路), transportation_name (路名), 
          # building (建築), landuse (公園/綠地), water (水系)
          java -Xmx12g -jar planetiler.jar \
            --osm-path=taiwan-latest.osm.pbf \
            --output=taiwan_base.pmtiles \
            --only-layers=transportation,transportation_name,building,landuse,water \
            --download \
            --force \
            --maxzoom=18
          
          ls -lh taiwan_base.pmtiles

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-base-map
          path: taiwan_base.pmtiles
          retention-days: 7
